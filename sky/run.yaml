resources:
  cloud: aws
  accelerators: A10G:1
  instance_type: g5.xlarge

workdir: ..

file_mounts:
  ~/sky_workdir/.env: ../.env

setup: |
  source $HOME/.local/bin/env 2>/dev/null || true

  # --- Python deps (uv) ---
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env
  uv sync
  uv --project hush sync
  uv --project aic sync

  # --- moshi-server (Kyutai STT) ---
  # System deps
  sudo apt-get install -y ffmpeg libopus-dev libssl-dev build-essential pkg-config

  # CUDA 12.2 compiler (driver 535 only supports PTX ISA up to 12.2; toolkit 12.4 generates incompatible PTX)
  sudo apt-get install -y cuda-compiler-12-2

  # uv-managed Python 3.11 (moshi-server links against libpython via PyO3)
  uv python install 3.11

  # Rust
  curl https://sh.rustup.rs -sSf | sh -s -- -y
  source "$HOME/.cargo/env"
  rustup update

  # Compile moshi-server with CUDA support (A10G = compute cap 86)
  # Use cuda-12.2 nvcc so the PTX ISA version is compatible with driver 535
  export PATH=/usr/local/cuda-12.2/bin:$PATH
  export CUDA_COMPUTE_CAP=86
  export PYO3_PYTHON=$(uv python find 3.11)
  unset LD_LIBRARY_PATH  # prevent stale LD_LIBRARY_PATH from interfering

  cargo install --features cuda --locked moshi-server --force

  # --- Hush native library ---
  mkdir -p hush/lib
  curl -fL "https://github.com/pulp-vision/Hush/raw/main/deployment/lib/libweya_nc.so" \
    -o hush/lib/libweya_nc.so

  # --- Pre-download Kyutai model weights (setup is cached, avoids waiting in run:) ---
  uv run python -c "
from huggingface_hub import snapshot_download
snapshot_download('kyutai/stt-2.6b-en-candle')
print('Kyutai model weights cached.')
"

run: |
  source $HOME/.local/bin/env
  source "$HOME/.cargo/env"

  # Set LD_LIBRARY_PATH to uv-managed Python 3.11's libpython (needed by moshi-server/PyO3)
  MOSHI_PYTHON=$(uv python find 3.11)
  MOSHI_LIBDIR=$($MOSHI_PYTHON -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
  export LD_LIBRARY_PATH=$MOSHI_LIBDIR:${LD_LIBRARY_PATH:-}

  # --- Parameters ---
  WHISPER_MODEL="distil-medium.en"
  HUSH_MODEL="advanced_dfnet16k_model_best_onnx"   # ONNX model stem
  HUSH_ATTEN=100                                   # atten_lim_db
  AIC_MODEL="quail-vf-2.0-l-16khz"                 # AIC model ID
  AIC_EL=0.8                                       # enhancement level (0.0–1.0)
  KYUTAI_CONCURRENCY=10                            # parallel streams to moshi-server

  # --- Derived output dirs (must match _output_dir() in each script) ---
  AIC_SLUG=$(echo "$AIC_MODEL" | tr '-' '_' | tr '.' '_')
  AIC_EL_PCT=$(python3 -c "print(int(${AIC_EL}*100))")
  HUSH_DIR="hush_${HUSH_MODEL}_atten${HUSH_ATTEN}"
  AIC_DIR="aic_${AIC_SLUG}_el${AIC_EL_PCT}"

  # --- Audio extraction & enhancement ---
  uv run python extract_mix_audio.py
  uv --project aic run python aic/enhance_dawn_chorus_with_aic.py \
    --model-id "$AIC_MODEL" --enhancement-level "$AIC_EL"
  uv --project hush run python hush/enhance_dawn_chorus_with_hush_onnx.py \
    --atten-lim-db "$HUSH_ATTEN"

  # --- Whisper transcription (sequential, GPU-accelerated) ---
  uv run python generate_transcripts.py mix --model "$WHISPER_MODEL"
  uv run python generate_transcripts.py "$HUSH_DIR" --model "$WHISPER_MODEL"
  uv run python generate_transcripts.py "$AIC_DIR" --model "$WHISPER_MODEL"

  # --- Kyutai transcription (parallel streaming) ---
  # LD_LIBRARY_PATH already set above for moshi-server
  export OMP_NUM_THREADS=1
  export MKL_NUM_THREADS=1
  ulimit -n 65535
  mkdir -p sky/static /tmp/moshi-logs

  # Start moshi-server in background (from sky/ so static_dir resolves)
  cd sky
  moshi-server worker --config configs/config-stt-en-hf.toml > /tmp/moshi-server.log 2>&1 &
  KYUTAI_PID=$!
  cd ..

  # Wait until model is loaded and ASR loop is running (first run downloads ~5 GB from HF)
  echo "Waiting for Kyutai server to be ready..."
  until grep -q "starting asr loop" /tmp/moshi-server.log 2>/dev/null; do sleep 5; done
  echo "Kyutai server ready."

  # Run conditions sequentially — batch_size=16, so all concurrency slots go to one job at a time
  uv run python generate_transcripts_kyutai.py mix --concurrency "$KYUTAI_CONCURRENCY"
  uv run python generate_transcripts_kyutai.py "$HUSH_DIR" --concurrency "$KYUTAI_CONCURRENCY"
  uv run python generate_transcripts_kyutai.py "$AIC_DIR" --concurrency "$KYUTAI_CONCURRENCY"

  kill $KYUTAI_PID || true

  # --- WER evaluation (combined Whisper + Kyutai plot) ---
  uv run python evaluate_wer.py \
    --hush-dir "$HUSH_DIR" \
    --aic-dir "$AIC_DIR" \
    --output wer_comparison.png
