resources:
  cloud: aws
  accelerators: A10G:1
  instance_type: g5.xlarge

workdir: ..

file_mounts:
  ~/sky_workdir/.env: ../.env

setup: |
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env
  uv sync
  uv --project hush sync
  uv --project aic sync

run: |
  source $HOME/.local/bin/env

  # --- Parameters ---
  WHISPER_MODEL="distil-medium.en"
  HUSH_MODEL="advanced_dfnet16k_model_best_onnx"   # ONNX model stem
  HUSH_ATTEN=100                                   # atten_lim_db
  AIC_MODEL="quail-vf-2.0-l-16khz"                 # AIC model ID
  AIC_EL=0.8                                       # enhancement level (0.0–1.0)

  # --- Derived output dirs (must match _output_dir() in each script) ---
  AIC_SLUG=$(echo "$AIC_MODEL" | tr '-' '_' | tr '.' '_')
  AIC_EL_PCT=$(python3 -c "print(int(${AIC_EL}*100))")
  HUSH_DIR="hush_${HUSH_MODEL}_atten${HUSH_ATTEN}"
  AIC_DIR="aic_${AIC_SLUG}_el${AIC_EL_PCT}"

  uv run python extract_mix_audio.py
  uv --project aic run python aic/enhance_dawn_chorus_with_aic.py \
    --model-id "$AIC_MODEL" --enhancement-level "$AIC_EL"
  uv --project hush run python hush/enhance_dawn_chorus_with_hush_onnx.py \
    --atten-lim-db "$HUSH_ATTEN"

  uv run python generate_transcripts.py mix --model "$WHISPER_MODEL"
  uv run python generate_transcripts.py "$HUSH_DIR" --model "$WHISPER_MODEL"
  uv run python generate_transcripts.py "$AIC_DIR" --model "$WHISPER_MODEL"

  uv run python evaluate_wer.py \
    --model "$WHISPER_MODEL" \
    --hush-dir "$HUSH_DIR" \
    --aic-dir "$AIC_DIR"
